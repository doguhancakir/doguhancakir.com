<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğuhan Çakır — Dental Student & Game Developer</title>
    <meta name="description" content="Doğuhan Çakır — 4th-year dental student at Nakhchivan State University, indie game developer, and IGDA Azerbaijan Game Jam winner.">
    <meta name="author" content="Mem Doğuhan Çakır">
    <meta property="og:title" content="Doğuhan Çakır">
    <meta property="og:description" content="Dental Student · Game Developer · Coming Soon">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://doguhancakir.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #0a1628;
            --navy-light: #0f2035;
            --teal: #00b4b4;
            --teal-glow: #00d4d4;
            --teal-dim: #007a7a;
            --white: #e8f0f2;
            --grey: #6b8a99;
        }

        body {
            background: var(--navy);
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background grain */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        /* Subtle gradient orb */
        .orb {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 180, 180, 0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        /* Floating crosses */
        .cross {
            position: fixed;
            color: var(--teal-dim);
            opacity: 0;
            font-size: 18px;
            font-weight: 300;
            animation: float 12s ease-in-out infinite;
            pointer-events: none;
        }

        .cross:nth-child(1) { top: 12%; left: 8%; animation-delay: 0s; }
        .cross:nth-child(2) { top: 20%; right: 15%; animation-delay: 3s; }
        .cross:nth-child(3) { bottom: 25%; left: 12%; animation-delay: 6s; }
        .cross:nth-child(4) { bottom: 15%; right: 10%; animation-delay: 9s; }
        .cross:nth-child(5) { top: 45%; left: 5%; animation-delay: 2s; }
        .cross:nth-child(6) { top: 60%; right: 6%; animation-delay: 7s; }

        @keyframes float {
            0%, 100% { opacity: 0; transform: translateY(0) rotate(0deg); }
            50% { opacity: 0.25; transform: translateY(-15px) rotate(45deg); }
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 700px;
        }

        .name {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 0.3em;
            animation: fadeUp 1s ease-out 0.2s both;
        }

        .name span {
            display: inline-block;
            background: linear-gradient(135deg, var(--white) 0%, var(--teal-glow) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-weight: 300;
            font-size: clamp(0.9rem, 2.5vw, 1.15rem);
            color: var(--grey);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 3rem;
            animation: fadeUp 1s ease-out 0.5s both;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--teal), transparent);
            margin: 0 auto 2.5rem;
            animation: fadeUp 1s ease-out 0.7s both;
        }

        .sleeping {
            font-weight: 500;
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            color: var(--white);
            margin-bottom: 0.6em;
            animation: fadeUp 1s ease-out 0.9s both;
        }

        .sleeping-sub {
            font-weight: 300;
            font-size: clamp(0.85rem, 2vw, 1rem);
            color: var(--grey);
            animation: fadeUp 1s ease-out 1.1s both;
        }

        /* Links */
        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 3rem;
            animation: fadeUp 1s ease-out 1.4s both;
            flex-wrap: wrap;
        }

        .links a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            padding: 0.5em 0;
            position: relative;
            transition: color 0.3s ease;
        }

        .links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--teal-glow);
            transition: width 0.3s ease;
        }

        .links a:hover { color: var(--teal-glow); }
        .links a:hover::after { width: 100%; }

        /* Bottom accent line */
        .bottom-line {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--teal-dim), transparent);
            opacity: 0.4;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .links { gap: 1rem; }
            .container { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="orb"></div>
    <div class="cross">+</div>
    <div class="cross">+</div>
    <div class="cross">+</div>
    <div class="cross">+</div>
    <div class="cross">+</div>
    <div class="cross">+</div>

    <div class="container">
        <h1 class="name"><span>Doğuhan Çakır</span></h1>
        <p class="tagline">Dental Student · Game Developer</p>
        <div class="divider"></div>
        <p class="sleeping">Bu site şu anda güzellik uykusundadır 🌙</p>
        <p class="sleeping-sub">Lütfen daha sonra tekrar gelin.</p>

        <div class="links">
            <a href="https://www.linkedin.com/in/doguhancakir" target="_blank">LinkedIn</a>
            <a href="https://www.youtube.com/@doguhancakir" target="_blank">YouTube</a>
            <a href="https://www.wikidata.org/wiki/Q132318053" target="_blank">Wikidata</a>
        </div>
    </div>

    <div class="bottom-line"></div>
</body>
</html>
