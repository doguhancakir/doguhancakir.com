<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğuhan Çakır</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-deep: #0a0a0f;
            --bg-mid: #12121a;
            --text-main: #e8e8e8;
            --text-dim: #666680;
            --red: #ff1744;
            --cyan: #00d4aa;
            --gold: #f0c040;
            --purple: #9c27b0;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
        }

        /* Atmospheric background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(255,23,68,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0,212,170,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 20%, rgba(240,192,64,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(156,39,176,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle noise texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .wheel-container {
            position: relative;
            width: min(600px, 85vmin);
            height: min(600px, 85vmin);
            z-index: 1;
        }

        /* Center circle */
        .center-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, #1a1a2e 0%, #0a0a0f 100%);
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 
                0 0 60px rgba(0,0,0,0.8),
                inset 0 0 30px rgba(0,0,0,0.5);
        }

        .center-hub:hover {
            border-color: rgba(255,255,255,0.25);
            box-shadow: 
                0 0 80px rgba(0,0,0,0.9),
                inset 0 0 30px rgba(0,0,0,0.5),
                0 0 40px rgba(255,255,255,0.03);
        }

        .center-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 3px;
            text-align: center;
            line-height: 1.1;
            color: #ffffff;
        }

        .center-subtitle {
            font-size: 9px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* Ring decoration */
        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.04);
            pointer-events: none;
            z-index: 5;
        }

        .ring-inner {
            width: 220px;
            height: 220px;
        }

        .ring-outer {
            width: 420px;
            height: 420px;
            border-style: dashed;
            animation: spin 120s linear infinite;
        }

        .ring-glow {
            width: 320px;
            height: 320px;
            border: none;
            background: radial-gradient(circle, transparent 45%, rgba(255,255,255,0.01) 50%, transparent 55%);
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Wheel segments */
        .segment {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 8;
        }

        .segment-box {
            width: 140px;
            height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(20, 20, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            clip-path: polygon(8% 0%, 100% 0%, 92% 100%, 0% 100%);
        }

        .segment:hover .segment-box {
            transform: scale(1.15);
            background: rgba(25, 25, 45, 0.8);
        }

        .segment-icon {
            font-size: 32px;
            margin-bottom: 8px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .segment-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 2px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .segment-sublabel {
            font-size: 10px;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-top: 4px;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.3s ease 0.1s;
            text-align: center;
            max-width: 120px;
        }

        .segment:hover .segment-sublabel {
            opacity: 1;
            transform: translateY(0);
        }

        /* Connector lines */
        .connector {
            position: absolute;
            background: rgba(255,255,255,0.04);
            z-index: 6;
            transition: all 0.4s ease;
        }

        /* Left segment - Davy's Dental (CYAN — clinical colors) */
        .segment-left {
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .segment-left .segment-box {
            border-color: rgba(0, 212, 170, 0.15);
        }

        .segment-left:hover .segment-box {
            border-color: rgba(0, 212, 170, 0.5);
            box-shadow: 
                0 0 30px rgba(0, 212, 170, 0.15),
                inset 0 0 20px rgba(0, 212, 170, 0.05);
        }

        .segment-left .segment-icon { color: var(--cyan); }
        .segment-left .segment-label { color: var(--cyan); }

        .segment-left:hover .segment-icon {
            transform: scale(1.2);
            filter: drop-shadow(0 0 12px rgba(0,212,170,0.5));
        }

        .connector-left {
            left: 140px;
            top: 50%;
            width: calc(50% - 250px);
            height: 1px;
            transform: translateY(-50%);
        }

        .segment-left:hover ~ .connector-left {
            background: rgba(0, 212, 170, 0.2);
            box-shadow: 0 0 8px rgba(0,212,170,0.1);
        }

        /* Right segment - TBA (RED) */
        .segment-right {
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .segment-right .segment-box {
            border-color: rgba(255, 23, 68, 0.1);
        }

        .segment-right:hover .segment-box {
            border-color: rgba(255, 23, 68, 0.4);
            box-shadow: 
                0 0 30px rgba(255, 23, 68, 0.1),
                inset 0 0 20px rgba(255, 23, 68, 0.03);
        }

        .segment-right .segment-icon { color: var(--red); }
        .segment-right .segment-label { color: var(--red); }

        .segment-right:hover .segment-icon {
            transform: scale(1.2);
            filter: drop-shadow(0 0 12px rgba(255,23,68,0.5));
        }

        .connector-right {
            right: 140px;
            top: 50%;
            width: calc(50% - 250px);
            height: 1px;
            transform: translateY(-50%);
        }

        /* Top segment - TBA (GOLD) */
        .segment-top {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .segment-top .segment-box {
            border-color: rgba(240, 192, 64, 0.1);
        }

        .segment-top:hover .segment-box {
            border-color: rgba(240, 192, 64, 0.4);
            box-shadow: 
                0 0 30px rgba(240, 192, 64, 0.1),
                inset 0 0 20px rgba(240, 192, 64, 0.03);
        }

        .segment-top .segment-icon { color: var(--gold); }
        .segment-top .segment-label { color: var(--gold); }

        .segment-top:hover .segment-icon {
            transform: scale(1.2);
            filter: drop-shadow(0 0 12px rgba(240,192,64,0.5));
        }

        .connector-top {
            top: 140px;
            left: 50%;
            width: 1px;
            height: calc(50% - 250px);
            transform: translateX(-50%);
        }

        /* Bottom segment - TBA (PURPLE) */
        .segment-bottom {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .segment-bottom .segment-box {
            border-color: rgba(156, 39, 176, 0.1);
        }

        .segment-bottom:hover .segment-box {
            border-color: rgba(156, 39, 176, 0.4);
            box-shadow: 
                0 0 30px rgba(156, 39, 176, 0.1),
                inset 0 0 20px rgba(156, 39, 176, 0.03);
        }

        .segment-bottom .segment-icon { color: var(--purple); }
        .segment-bottom .segment-label { color: var(--purple); }

        .segment-bottom:hover .segment-icon {
            transform: scale(1.2);
            filter: drop-shadow(0 0 12px rgba(156,39,176,0.5));
        }

        .connector-bottom {
            bottom: 140px;
            left: 50%;
            width: 1px;
            height: calc(50% - 250px);
            transform: translateX(-50%);
        }

        /* TBA lock icon pulse */
        .tba-pulse {
            animation: tbaPulse 3s ease-in-out infinite;
        }

        @keyframes tbaPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        /* Footer */
        .footer-links {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 32px;
            z-index: 20;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
        }

        .footer-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--text-main);
            transition: width 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--text-main);
        }

        .footer-links a:hover::after {
            width: 100%;
        }

        /* Entrance animations */
        .center-hub {
            animation: hubEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        .segment-left { animation: segSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both; }
        .segment-right { animation: segSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both; }
        .segment-top { animation: segSlideInV 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both; }
        .segment-bottom { animation: segSlideInV 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.1s both; }

        .ring-inner { animation: ringFade 1s ease 0.3s both; }
        .ring-outer { animation: ringFade 1s ease 0.6s both; }
        .ring-glow { animation: ringFade 1s ease 0.4s both; }

        .connector { animation: connectorFade 0.8s ease 1.3s both; }

        @keyframes hubEntrance {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes segSlideIn {
            from { opacity: 0; transform: translateY(-50%) translateX(-30px); }
            to { opacity: 1; transform: translateY(-50%) translateX(0); }
        }

        @keyframes segSlideInV {
            from { opacity: 0; transform: translateX(-50%) translateY(-30px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @keyframes ringFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes connectorFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .footer-links { animation: ringFade 0.6s ease 1.5s both; }

        /* Mobile */
        @media (max-width: 600px) {
            .wheel-container {
                width: 90vmin;
                height: 90vmin;
            }

            .center-hub {
                width: 120px;
                height: 120px;
            }

            .center-name {
                font-size: 20px;
                letter-spacing: 2px;
            }

            .center-subtitle {
                font-size: 7px;
                letter-spacing: 3px;
            }

            .segment-box {
                width: 100px;
                height: 100px;
            }

            .segment-icon {
                font-size: 24px;
                margin-bottom: 4px;
            }

            .segment-label {
                font-size: 12px;
            }

            .ring-inner { width: 155px; height: 155px; }
            .ring-outer { width: 300px; height: 300px; }
            .ring-glow { width: 230px; height: 230px; }
        }

        @media (max-width: 400px) {
            .segment-box {
                width: 80px;
                height: 80px;
            }

            .segment-icon { font-size: 20px; }
            .segment-label { font-size: 10px; letter-spacing: 1px; }
            .center-hub { width: 100px; height: 100px; }
            .center-name { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="wheel-container">
        <!-- Center Hub -->
        <div class="center-hub">
            <div class="center-name">DOĞUHAN<br>ÇAKIR</div>
            <div class="center-subtitle">Select a path</div>
        </div>

        <!-- Rings -->
        <div class="ring ring-inner"></div>
        <div class="ring ring-glow"></div>
        <div class="ring ring-outer"></div>

        <!-- Connectors -->
        <div class="connector connector-left"></div>
        <div class="connector connector-right"></div>
        <div class="connector connector-top"></div>
        <div class="connector connector-bottom"></div>

        <!-- LEFT — Davy's Dental -->
        <div class="segment segment-left" onclick="window.location.href='https://dus.doguhancakir.com'">

        <div class="segment segment-right">

        <div class="segment segment-top">

                <div class="segment-label">???</div>

        <!-- BOTTOM — TBA -->
        <div class="segment segment-bottom">

        </div>
    </div>

    <!-- Footer -->
    <div class="footer-links">
        <a href="https://www.linkedin.com/in/mem-do%C4%9Fuhan-%C3%A7ak%C4%B1r-b2833b374/" target="_blank">LinkedIn</a>

        <a href="https://github.com/doguhancakir" target="_blank">GitHub</a>
    </div>

</body>
</html>
